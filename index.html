<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple, elegant bingo number caller with a configurable range, voice announcements, and a live board.">
  <meta name="theme-color" content="#1e90ff">
  <title>🎰 DSL Bingo Game</title>
  <style>
    :root {
      --bg-card: #ffffff;
      --bg-subtle: #f8f9fa;
      --text-main: #333333;
      --text-muted: #666666;
      --accent: #667eea;
      --accent-dark: #5568d3;
      --accent-2: #764ba2;
      --success: #48bb78;
      --success-dark: #38a169;
      --danger: #f56565;
      --danger-dark: #e53e3e;
      --border: #dddddd;
      --board-cell: #eef1fb;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    html[data-theme="dark"] {
      --bg-card: #1f2430;
      --bg-subtle: #2a3040;
      --text-main: #e8eaf0;
      --text-muted: #a4adc0;
      --accent: #8b9bff;
      --accent-dark: #7385f0;
      --board-cell: #2f3648;
      --border: #3a4152;
      --shadow: rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-attachment: fixed;
      background-image:
        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"><defs><linearGradient id="skyGrad" x1="0%25" y1="0%25" x2="0%25" y2="60%25"><stop offset="0%25" style="stop-color:%231e90ff;stop-opacity:1"/><stop offset="100%25" style="stop-color:%2387ceeb;stop-opacity:1"/></linearGradient></defs><rect width="1200" height="800" fill="url(%23skyGrad)"/><path d="M120,140 Q150,120 180,140 Q210,110 240,140 Q270,120 300,140 Q280,160 250,160 Q200,165 120,140 Z" fill="%23d4e8f7" opacity="0.6"/><path d="M850,200 Q900,180 950,200 Q990,170 1040,200 Q1080,185 1120,205 Q1080,225 1020,230 Q950,235 850,200 Z" fill="%23d4e8f7" opacity="0.55"/><path d="M450,110 Q500,85 550,110 Q600,90 650,115 Q700,100 750,125 Q700,150 600,155 Q520,160 450,110 Z" fill="%23c8dff0" opacity="0.5"/><path d="M0,520 Q200,450 400,480 Q600,510 800,460 Q1000,520 1200,500 L1200,800 L0,800 Z" fill="%2390ee90" opacity="0.8"/><path d="M0,580 Q150,540 300,560 Q600,600 900,550 Q1050,570 1200,560 L1200,800 L0,800 Z" fill="%2376b347" opacity="0.7"/><path d="M0,650 Q250,620 500,640 Q800,680 1200,650 L1200,800 L0,800 Z" fill="%236ba43b" opacity="0.8"/></svg>');
      background-size: cover;
      background-position: center;
      background-color: #1e90ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0) 0%, rgba(0,0,0,0.05) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .main-container {
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: 0 20px 60px var(--shadow);
      padding: 40px;
      max-width: 820px;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
      transition: background 0.3s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      margin-bottom: 30px;
    }

    .game-header h1 {
      font-size: 2.5em;
      color: var(--text-main);
      text-align: center;
    }

    .theme-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg-subtle);
      border: 2px solid var(--border);
      color: var(--text-main);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-50%) scale(1.08);
      border-color: var(--accent);
    }

    .layout-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-label {
      font-weight: 600;
      color: var(--text-main);
      font-size: 1em;
      white-space: nowrap;
    }

    .settings-toggle-btn {
      background: var(--bg-subtle);
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: all 0.3s ease;
      flex: 1;
    }

    .settings-toggle-btn:hover {
      filter: brightness(0.97);
      transform: translateY(-2px);
    }

    .toggle-icon {
      font-size: 1.2em;
      transition: transform 0.3s ease;
    }

    .settings-toggle-btn.active .toggle-icon {
      transform: rotate(180deg);
    }

    .settings-sidebar {
      background: var(--bg-subtle);
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid var(--accent);
      max-height: 500px;
      overflow: hidden;
      transition: all 0.3s ease;
      opacity: 1;
    }

    .settings-sidebar.collapsed {
      max-height: 0;
      padding: 0 20px;
      opacity: 0;
      visibility: hidden;
    }

    .settings-sidebar h2 {
      font-size: 1.1em;
      margin-bottom: 20px;
      color: var(--text-main);
    }

    .settings-inputs-row {
      display: flex;
      gap: 15px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 160px;
    }

    .input-group label {
      font-weight: 500;
      color: var(--text-muted);
      font-size: 0.9em;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .input-group input {
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 5px;
      font-size: 0.95em;
      width: 100px;
      flex: 0 0 auto;
      background: var(--bg-card);
      color: var(--text-main);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .settings-options {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 18px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.92em;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .btn-block {
      width: 100%;
    }

    .game-container {
      text-align: center;
    }

    .display-section {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: white;
      padding: 34px 40px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .display-section h3 {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .number-display {
      font-size: 5em;
      font-weight: bold;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .number-display.pop {
      animation: pop 0.45s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }

    @keyframes pop {
      0%   { transform: scale(0.3); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }

    .recent-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 46px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .recent-label {
      font-size: 0.8em;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .recent-badge {
      background: var(--bg-subtle);
      border: 2px solid var(--accent);
      color: var(--accent);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95em;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
      justify-content: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, rgba(72, 187, 120, 0.05) 0%, rgba(102, 126, 234, 0.05) 100%);
      border-radius: 15px;
      border: 2px solid rgba(72, 187, 120, 0.2);
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 120px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: var(--success-dark);
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: white;
    }

    .btn-large {
      font-size: 1.5em;
      padding: 24px 50px;
      flex: 1 1 260px;
      min-width: 260px;
      min-height: 70px;
      box-shadow: 0 6px 20px rgba(72, 187, 120, 0.4);
      border: 3px solid rgba(56, 161, 105, 0.3);
    }

    .btn-large:hover {
      box-shadow: 0 10px 30px rgba(72, 187, 120, 0.6);
      transform: translateY(-4px);
      border-color: rgba(56, 161, 105, 0.6);
    }

    .btn-large:active {
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-dark);
    }

    .hint {
      font-size: 0.78em;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: center;
      width: 100%;
    }

    .kbd {
      display: inline-block;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.9em;
      font-family: monospace;
      color: var(--text-main);
    }

    .called-info {
      font-size: 0.8em;
      font-weight: 600;
      color: var(--accent);
      margin-left: 8px;
    }

    .board-section {
      text-align: left;
      margin-top: 8px;
    }

    .board-section h3 {
      color: var(--text-main);
      margin-bottom: 15px;
      font-size: 1.1em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
      gap: 8px;
    }

    .board-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--board-cell);
      color: var(--text-muted);
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95em;
      transition: all 0.25s ease;
    }

    .board-cell.called {
      background: var(--accent);
      color: white;
      transform: scale(1.04);
      box-shadow: 0 3px 8px rgba(102, 126, 234, 0.4);
    }

    .board-cell.latest {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.35);
    }

    .empty-note {
      color: var(--text-muted);
      font-size: 0.9em;
      font-style: italic;
    }

    .bottom-actions {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 2px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bottom-actions .btn {
      width: auto;
      padding: 12px 28px;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      background: #ccc !important;
      color: #666 !important;
      border-color: #999 !important;
      box-shadow: none !important;
    }

    .btn:disabled:hover {
      transform: none;
      box-shadow: none;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 16px;
      z-index: 999;
      pointer-events: none;
      opacity: 0.9;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .main-container { padding: 20px; }
      .game-header h1 { font-size: 1.6em; }
      .theme-toggle { width: 38px; height: 38px; font-size: 1em; }
      .settings-toggle-btn { width: 100%; }
      .settings-sidebar { border-left: none; border-top: 4px solid var(--accent); }
      .number-display { font-size: 3.2em; }
      .controls { flex-direction: column; }
      .btn-large { flex: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="game-header">
      <h1>🎰 DSL Bingo Game</h1>
      <button id="theme_toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>

    <div class="layout-wrapper">
      <div class="settings-toggle">
        <span class="settings-label">Range:</span>
        <button id="settings_toggle_btn" class="settings-toggle-btn" aria-expanded="false" aria-controls="settings_sidebar">
          <span id="range_display_btn">0–90</span>
          <span class="toggle-icon" aria-hidden="true">⚙️</span>
        </button>
      </div>

      <div id="settings_sidebar" class="settings-sidebar collapsed">
        <h2>Settings</h2>
        <div class="settings-inputs-row">
          <div class="input-group">
            <label for="min_number">Min Number:</label>
            <input type="number" id="min_number" value="0" min="0" inputmode="numeric" />
          </div>
          <div class="input-group">
            <label for="max_number">Max Number:</label>
            <input type="number" id="max_number" value="90" min="0" inputmode="numeric" />
          </div>
        </div>
        <div class="settings-options">
          <label class="checkbox-group">
            <input type="checkbox" id="voice_toggle" />
            🔊 Announce numbers aloud
          </label>
        </div>
        <button id="update_range_btn" class="btn btn-primary btn-block">Update Range &amp; Reset</button>
      </div>

      <div class="game-container">
        <div class="display-section">
          <h3>Current Number</h3>
          <div id="current_number" class="number-display" aria-live="polite" aria-atomic="true">–</div>
        </div>

        <div class="recent-strip" id="recent_strip"></div>

        <div class="controls">
          <button id="next_number_btn" class="btn btn-success btn-large">Next Number</button>
          <p class="hint">Press <span class="kbd">Space</span> or <span class="kbd">N</span> to draw the next number · <span class="kbd">U</span> to undo</p>
        </div>

        <div class="board-section">
          <h3>Board <span class="called-info">(<span id="called_count">0</span> / <span id="total_count">91</span> called)</span></h3>
          <div id="board" class="board" aria-label="Bingo board"></div>
        </div>

        <div class="bottom-actions">
          <button id="undo_btn" class="btn btn-outline">↩ Undo Last</button>
          <button id="reset_btn" class="btn btn-danger">Reset Game</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Game State Manager ----------
    class BingoGame {
      static STORAGE_KEY = 'bingoGame';
      static DEFAULT_MIN = 0;
      static DEFAULT_MAX = 90;

      constructor() {
        this.loadState();
      }

      loadState() {
        let state = null;
        try {
          state = JSON.parse(localStorage.getItem(BingoGame.STORAGE_KEY));
        } catch (e) {
          state = null; // corrupted storage — fall back to defaults
        }

        if (state && Number.isFinite(state.minNumber) && Number.isFinite(state.maxNumber)) {
          this.minNumber = state.minNumber;
          this.maxNumber = state.maxNumber;
          this.calledNumbers = Array.isArray(state.calledNumbers) ? state.calledNumbers : [];
          this.voiceEnabled = !!state.voiceEnabled;
        } else {
          this.minNumber = BingoGame.DEFAULT_MIN;
          this.maxNumber = BingoGame.DEFAULT_MAX;
          this.calledNumbers = [];
          this.voiceEnabled = false;
        }
      }

      saveState() {
        try {
          localStorage.setItem(BingoGame.STORAGE_KEY, JSON.stringify({
            minNumber: this.minNumber,
            maxNumber: this.maxNumber,
            calledNumbers: this.calledNumbers,
            voiceEnabled: this.voiceEnabled
          }));
        } catch (e) {
          /* storage unavailable (e.g. private mode) — game still works in-memory */
        }
      }

      getTotalNumbers() {
        return this.maxNumber - this.minNumber + 1;
      }

      isComplete() {
        return this.calledNumbers.length >= this.getTotalNumbers();
      }

      getLastNumber() {
        return this.calledNumbers.length ? this.calledNumbers[this.calledNumbers.length - 1] : null;
      }

      getNextNumber() {
        const called = new Set(this.calledNumbers);
        const available = [];
        for (let i = this.minNumber; i <= this.maxNumber; i++) {
          if (!called.has(i)) available.push(i);
        }
        if (available.length === 0) return null;

        const selected = available[Math.floor(Math.random() * available.length)];
        this.calledNumbers.push(selected);
        this.saveState();
        return selected;
      }

      undoLast() {
        if (this.calledNumbers.length === 0) return null;
        const removed = this.calledNumbers.pop();
        this.saveState();
        return removed;
      }

      updateRange(min, max) {
        if (!Number.isInteger(min) || !Number.isInteger(max)) return false;
        if (min < 0 || max < 0) return false;
        if (min >= max) return false;
        this.minNumber = min;
        this.maxNumber = max;
        this.calledNumbers = [];
        this.saveState();
        return true;
      }

      setVoice(enabled) {
        this.voiceEnabled = enabled;
        this.saveState();
      }

      resetGame() {
        this.calledNumbers = [];
        this.saveState();
      }
    }

    const game = new BingoGame();

    // ---------- DOM refs ----------
    const el = {
      currentNumber: document.getElementById('current_number'),
      rangeDisplay: document.getElementById('range_display_btn'),
      minInput: document.getElementById('min_number'),
      maxInput: document.getElementById('max_number'),
      calledCount: document.getElementById('called_count'),
      totalCount: document.getElementById('total_count'),
      board: document.getElementById('board'),
      recentStrip: document.getElementById('recent_strip'),
      nextBtn: document.getElementById('next_number_btn'),
      undoBtn: document.getElementById('undo_btn'),
      resetBtn: document.getElementById('reset_btn'),
      settingsBtn: document.getElementById('settings_toggle_btn'),
      sidebar: document.getElementById('settings_sidebar'),
      updateBtn: document.getElementById('update_range_btn'),
      voiceToggle: document.getElementById('voice_toggle'),
      themeToggle: document.getElementById('theme_toggle')
    };

    // ---------- Voice announcements ----------
    function announce(number) {
      if (!game.voiceEnabled || !('speechSynthesis' in window)) return;
      try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(String(number));
        utter.rate = 0.85;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      } catch (e) { /* ignore */ }
    }

    // ---------- Rendering ----------
    function renderBoard() {
      const called = new Set(game.calledNumbers);
      const last = game.getLastNumber();
      const frag = document.createDocumentFragment();
      for (let i = game.minNumber; i <= game.maxNumber; i++) {
        const cell = document.createElement('div');
        cell.className = 'board-cell';
        if (called.has(i)) cell.classList.add('called');
        if (i === last) cell.classList.add('latest');
        cell.textContent = i;
        frag.appendChild(cell);
      }
      el.board.innerHTML = '';
      el.board.appendChild(frag);
    }

    function renderRecent() {
      const recent = game.calledNumbers.slice(-6).reverse();
      el.recentStrip.innerHTML = '';
      if (recent.length === 0) return;

      const label = document.createElement('span');
      label.className = 'recent-label';
      label.textContent = 'Recent:';
      el.recentStrip.appendChild(label);

      recent.forEach(num => {
        const badge = document.createElement('span');
        badge.className = 'recent-badge';
        badge.textContent = num;
        el.recentStrip.appendChild(badge);
      });
    }

    function updateDisplay() {
      el.rangeDisplay.textContent = `${game.minNumber}–${game.maxNumber}`;
      el.minInput.value = game.minNumber;
      el.maxInput.value = game.maxNumber;
      el.calledCount.textContent = game.calledNumbers.length;
      el.totalCount.textContent = game.getTotalNumbers();
      el.voiceToggle.checked = game.voiceEnabled;
      el.nextBtn.disabled = game.isComplete();
      el.undoBtn.disabled = game.calledNumbers.length === 0;
      renderRecent();
      renderBoard();
    }

    function showCurrent(value, animate) {
      el.currentNumber.textContent = value;
      if (animate) {
        el.currentNumber.classList.remove('pop');
        void el.currentNumber.offsetWidth; // reflow to restart animation
        el.currentNumber.classList.add('pop');
      }
    }

    // ---------- Confetti celebration ----------
    function celebrate() {
      const colors = ['#667eea', '#764ba2', '#48bb78', '#f56565', '#f6ad55', '#4fd1c5'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4600);
      }
    }

    // ---------- Actions ----------
    function drawNext() {
      if (game.isComplete()) return;
      const number = game.getNextNumber();
      if (number === null) {
        updateDisplay();
        return;
      }
      showCurrent(number, true);
      announce(number);
      updateDisplay();
      if (game.isComplete()) celebrate();
    }

    function undo() {
      const removed = game.undoLast();
      if (removed === null) return;
      const last = game.getLastNumber();
      showCurrent(last === null ? '–' : last, false);
      updateDisplay();
    }

    // ---------- Theme ----------
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      el.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      try { localStorage.setItem('bingoTheme', theme); } catch (e) {}
    }

    // ---------- Event wiring ----------
    el.settingsBtn.addEventListener('click', () => {
      const collapsed = el.sidebar.classList.toggle('collapsed');
      el.settingsBtn.classList.toggle('active', !collapsed);
      el.settingsBtn.setAttribute('aria-expanded', String(!collapsed));
    });

    el.nextBtn.addEventListener('click', drawNext);
    el.undoBtn.addEventListener('click', undo);

    el.voiceToggle.addEventListener('change', () => {
      game.setVoice(el.voiceToggle.checked);
      if (el.voiceToggle.checked) announce('Voice enabled');
    });

    [el.minInput, el.maxInput].forEach(input => {
      input.addEventListener('input', () => {
        if (input.value && parseInt(input.value, 10) < 0) input.value = '0';
      });
    });

    el.updateBtn.addEventListener('click', () => {
      const min = parseInt(el.minInput.value, 10);
      const max = parseInt(el.maxInput.value, 10);

      if (Number.isNaN(min) || Number.isNaN(max)) {
        alert('Please enter valid numbers for both fields.');
        return;
      }
      if (min < 0 || max < 0) {
        alert('Numbers cannot be negative. Please enter values 0 or greater.');
        return;
      }
      if (min >= max) {
        alert('Min number must be less than max number.');
        return;
      }

      if (game.updateRange(min, max)) {
        el.sidebar.classList.add('collapsed');
        el.settingsBtn.classList.remove('active');
        el.settingsBtn.setAttribute('aria-expanded', 'false');
        showCurrent('–', false);
        updateDisplay();
      }
    });

    el.resetBtn.addEventListener('click', () => {
      if (game.calledNumbers.length === 0) return;
      if (confirm('Are you sure you want to reset the game?')) {
        game.resetGame();
        showCurrent('–', false);
        updateDisplay();
      }
    });

    el.themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Keyboard shortcuts (ignore while typing in inputs)
    document.addEventListener('keydown', (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;

      if (e.code === 'Space' || e.key.toLowerCase() === 'n') {
        e.preventDefault();
        drawNext();
      } else if (e.key.toLowerCase() === 'u') {
        e.preventDefault();
        undo();
      }
    });

    // ---------- Init ----------
    (function init() {
      let savedTheme = 'light';
      try {
        savedTheme = localStorage.getItem('bingoTheme') ||
          (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (e) {}
      applyTheme(savedTheme);

      const last = game.getLastNumber();
      showCurrent(last === null ? '–' : last, false);
      updateDisplay();
    })();
  </script>
</body>
</html>
