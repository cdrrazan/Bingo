<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium bingo number caller with a configurable range, glowing lottery-ball reveals, voice announcements, and a live board.">
  <meta name="theme-color" content="#0b0f1e">
  <title>🎰 DSL Bingo Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Google Sans', 'Segoe UI', system-ui, -apple-system, Tahoma, Geneva, Verdana, sans-serif;

      /* Premium dark (default) */
      --bg-0: #070912;
      --bg-1: #0f1424;
      --aurora-1: rgba(124, 92, 255, 0.55);
      --aurora-2: rgba(56, 189, 248, 0.40);
      --aurora-3: rgba(244, 114, 182, 0.35);
      --aurora-4: rgba(45, 212, 191, 0.30);

      --glass: rgba(255, 255, 255, 0.055);
      --glass-strong: rgba(255, 255, 255, 0.09);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-border-strong: rgba(255, 255, 255, 0.22);
      --card-shadow: 0 40px 120px rgba(0, 0, 0, 0.65);

      --text-main: #f4f6ff;
      --text-muted: #a7b0cc;
      --text-faint: #6d7695;

      --violet: #a78bfa;
      --indigo: #6366f1;
      --gold: #fbbf24;
      --gold-soft: #fcd34d;
      --emerald: #34d399;
      --emerald-deep: #059669;
      --danger: #fb7185;
      --danger-deep: #e11d48;

      --board-cell: rgba(255, 255, 255, 0.05);
      --board-cell-border: rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] {
      --bg-0: #eef1fb;
      --bg-1: #dfe6ff;
      --aurora-1: rgba(124, 92, 255, 0.35);
      --aurora-2: rgba(56, 189, 248, 0.30);
      --aurora-3: rgba(244, 114, 182, 0.25);
      --aurora-4: rgba(45, 212, 191, 0.22);

      --glass: rgba(255, 255, 255, 0.72);
      --glass-strong: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.9);
      --glass-border-strong: rgba(120, 130, 190, 0.35);
      --card-shadow: 0 30px 90px rgba(60, 70, 130, 0.30);

      --text-main: #1c2340;
      --text-muted: #55607f;
      --text-faint: #8a93b2;

      --board-cell: rgba(120, 130, 190, 0.10);
      --board-cell-border: rgba(120, 130, 190, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      font-family: var(--font);
      color: var(--text-main);
      background: var(--bg-0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated aurora backdrop */
    .aurora {
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(38% 42% at 18% 22%, var(--aurora-1) 0%, transparent 62%),
        radial-gradient(34% 40% at 82% 18%, var(--aurora-2) 0%, transparent 60%),
        radial-gradient(42% 46% at 78% 82%, var(--aurora-3) 0%, transparent 62%),
        radial-gradient(40% 44% at 20% 84%, var(--aurora-4) 0%, transparent 60%),
        var(--bg-1);
      filter: saturate(1.15);
      animation: auroraDrift 22s ease-in-out infinite alternate;
    }

    @keyframes auroraDrift {
      0%   { transform: translate3d(-2%, -1%, 0) scale(1.02); }
      50%  { transform: translate3d(2%, 2%, 0) scale(1.08); }
      100% { transform: translate3d(-1%, 1%, 0) scale(1.03); }
    }

    /* Fine grain / vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 0%, transparent 55%, rgba(0,0,0,0.28) 100%);
    }

    .main-container {
      background: var(--glass);
      backdrop-filter: blur(26px) saturate(1.4);
      -webkit-backdrop-filter: blur(26px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255,255,255,0.18);
      padding: 40px;
      max-width: 1120px;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 28px;
    }

    .game-header h1 {
      font-size: 2.4em;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
      background: linear-gradient(90deg, var(--violet), var(--gold-soft) 55%, var(--emerald));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 4px 18px rgba(124, 92, 255, 0.35));
    }

    .game-header h1 .emoji {
      -webkit-text-fill-color: initial;
      color: initial;
    }

    .theme-toggle {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--glass-strong);
      border: 1px solid var(--glass-border-strong);
      color: var(--text-main);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 1.2em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .theme-toggle:hover {
      transform: translateY(-50%) scale(1.1) rotate(-8deg);
      border-color: var(--violet);
      box-shadow: 0 8px 24px rgba(124, 92, 255, 0.35);
    }

    .layout-wrapper { display: flex; flex-direction: column; gap: 20px; }

    .settings-toggle { display: flex; align-items: center; gap: 12px; }

    .settings-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    .settings-toggle-btn {
      background: var(--glass-strong);
      border: 1px solid var(--glass-border-strong);
      color: var(--text-main);
      padding: 13px 20px;
      border-radius: 14px;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: all 0.25s ease;
      flex: 1;
    }

    .settings-toggle-btn:hover {
      border-color: var(--violet);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(124, 92, 255, 0.22);
    }

    .toggle-icon { font-size: 1.15em; transition: transform 0.35s ease; }
    .settings-toggle-btn.active .toggle-icon { transform: rotate(180deg); }

    .settings-sidebar {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 22px;
      border-radius: 16px;
      max-height: 520px;
      overflow: hidden;
      transition: all 0.35s ease;
      opacity: 1;
    }

    .settings-sidebar.collapsed {
      max-height: 0;
      padding: 0 22px;
      opacity: 0;
      visibility: hidden;
      border-color: transparent;
    }

    .settings-sidebar h2 {
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      color: var(--text-muted);
    }

    .settings-inputs-row { display: flex; gap: 15px; margin-bottom: 16px; flex-wrap: wrap; }

    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 170px;
    }

    .input-group label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9em;
      white-space: nowrap;
    }

    .input-group input {
      padding: 10px 12px;
      border: 1px solid var(--glass-border-strong);
      border-radius: 10px;
      font-size: 0.95em;
      width: 110px;
      background: var(--glass-strong);
      color: var(--text-main);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--violet);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18);
    }

    .settings-options { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 20px; }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 0.92em;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-group input { width: 18px; height: 18px; accent-color: var(--violet); cursor: pointer; }

    .btn-block { width: 100%; }

    .game-container { text-align: center; }

    .game-grid {
      display: grid;
      grid-template-columns: minmax(320px, 400px) 1fr;
      gap: 26px;
      align-items: start;
    }

    .game-main { display: flex; flex-direction: column; }
    .game-main .controls { margin-bottom: 0; }

    /* ---------- Stage + lottery ball ---------- */
    .display-section {
      position: relative;
      padding: 40px 24px 34px;
      border-radius: 22px;
      margin-bottom: 20px;
      overflow: hidden;
      background:
        radial-gradient(120% 140% at 50% -20%, rgba(255,255,255,0.10) 0%, transparent 55%),
        linear-gradient(160deg, rgba(99,102,241,0.30), rgba(168,85,247,0.16) 45%, rgba(45,212,191,0.14));
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .display-section h3 {
      font-size: 0.78em;
      color: var(--text-muted);
      margin-bottom: 22px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .ball-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .number-display {
      position: relative;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.4em;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      background:
        radial-gradient(circle at 32% 26%, #ffffff 0%, rgba(255,255,255,0.55) 8%, transparent 34%),
        radial-gradient(circle at 50% 50%, var(--violet) 0%, var(--indigo) 58%, #3b2f9e 100%);
      box-shadow:
        0 22px 50px rgba(79, 70, 229, 0.55),
        inset 0 -14px 30px rgba(0,0,0,0.35),
        inset 0 8px 22px rgba(255,255,255,0.28);
      text-shadow: 0 3px 12px rgba(0,0,0,0.45);
      transition: background 0.4s ease;
    }

    /* subtle idle float + glow ring */
    .number-display::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--violet), var(--gold), var(--emerald), var(--violet));
      filter: blur(14px);
      opacity: 0.35;
      z-index: -1;
      animation: spinGlow 8s linear infinite;
    }

    @keyframes spinGlow { to { transform: rotate(360deg); } }

    .number-display.pop { animation: ballPop 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

    @keyframes ballPop {
      0%   { transform: scale(0.2) rotate(-25deg); }
      55%  { transform: scale(1.14) rotate(8deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .number-display.rolling {
      background:
        radial-gradient(circle at 32% 26%, #ffffff 0%, rgba(255,255,255,0.5) 8%, transparent 34%),
        radial-gradient(circle at 50% 50%, var(--gold-soft) 0%, var(--gold) 55%, #b45309 100%);
      box-shadow:
        0 22px 50px rgba(251, 191, 36, 0.5),
        inset 0 -14px 30px rgba(0,0,0,0.30),
        inset 0 8px 22px rgba(255,255,255,0.35);
    }

    .recent-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 48px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .recent-label {
      font-size: 0.72em;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .recent-badge {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.95em;
      color: #fff;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.7) 0%, transparent 40%),
        linear-gradient(160deg, var(--violet), var(--indigo));
      box-shadow: 0 6px 14px rgba(79, 70, 229, 0.4), inset 0 -4px 8px rgba(0,0,0,0.25);
    }

    .recent-badge:first-of-type {
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.75) 0%, transparent 40%),
        linear-gradient(160deg, var(--gold-soft), var(--gold));
      box-shadow: 0 8px 18px rgba(251,191,36,0.5), inset 0 -4px 8px rgba(0,0,0,0.2);
    }

    /* ---------- Controls ---------- */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin: 22px 0;
      padding: 30px 22px;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
    }

    .btn {
      padding: 13px 22px;
      border: 1px solid transparent;
      border-radius: 14px;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      min-width: 130px;
    }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn-outline {
      background: var(--glass-strong);
      color: var(--text-main);
      border: 1px solid var(--glass-border-strong);
    }
    .btn-outline:hover {
      transform: translateY(-2px);
      border-color: var(--violet);
      box-shadow: 0 10px 24px rgba(124,92,255,0.25);
    }

    .btn-danger {
      background: linear-gradient(160deg, var(--danger), var(--danger-deep));
      color: #fff;
      box-shadow: 0 10px 24px rgba(225, 29, 72, 0.35);
    }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(225,29,72,0.5); }

    .btn-primary {
      background: linear-gradient(160deg, var(--indigo), #7c3aed);
      color: #fff;
      box-shadow: 0 10px 26px rgba(99, 102, 241, 0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(99,102,241,0.55); }

    /* Hero draw button */
    .btn-large {
      position: relative;
      width: 100%;
      max-width: 420px;
      font-size: 1.4em;
      font-weight: 800;
      letter-spacing: 0.3px;
      padding: 24px 40px;
      min-height: 74px;
      color: #06281c;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #6ee7b7 0%, var(--emerald) 45%, #10b981 100%);
      box-shadow: 0 16px 40px rgba(16, 185, 129, 0.5), inset 0 2px 0 rgba(255,255,255,0.5);
      border: none;
    }

    .btn-large::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }
    .btn-large:hover::before { left: 130%; }

    .btn-large:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 52px rgba(16, 185, 129, 0.65), inset 0 2px 0 rgba(255,255,255,0.6);
    }
    .btn-large:active { transform: translateY(-1px) scale(0.99); }

    .hint {
      font-size: 0.78em;
      color: var(--text-faint);
      text-align: center;
    }

    .kbd {
      display: inline-block;
      background: var(--glass-strong);
      border: 1px solid var(--glass-border-strong);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 0.9em;
      font-family: ui-monospace, monospace;
      color: var(--text-main);
    }

    /* ---------- Board ---------- */
    .board-section { text-align: left; margin-top: 8px; }

    .board-section h3 {
      color: var(--text-main);
      margin-bottom: 16px;
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .called-info { font-weight: 700; color: var(--violet); letter-spacing: 0; text-transform: none; font-size: 1.05em; white-space: nowrap; }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 9px;
    }

    .board-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--board-cell);
      border: 1px solid var(--board-cell-border);
      color: var(--text-faint);
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95em;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
    }

    .board-cell.called {
      color: #fff;
      border-color: transparent;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.5) 0%, transparent 45%),
        linear-gradient(160deg, var(--violet), var(--indigo));
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.45);
      transform: translateY(-1px);
    }

    .board-cell.latest {
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.6) 0%, transparent 45%),
        linear-gradient(160deg, var(--gold-soft), var(--gold));
      color: #4a2c00;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.35), 0 8px 20px rgba(251,191,36,0.5);
      animation: latestPulse 1.6s ease-in-out infinite;
    }

    @keyframes latestPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(251,191,36,0.35), 0 8px 20px rgba(251,191,36,0.45); }
      50%      { box-shadow: 0 0 0 6px rgba(251,191,36,0.18), 0 10px 26px rgba(251,191,36,0.6); }
    }

    .bottom-actions {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bottom-actions .btn { width: auto; padding: 13px 28px; }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.6);
      box-shadow: none !important;
      transform: none !important;
    }
    .btn:disabled::before { display: none; }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      top: -14px;
      width: 10px;
      height: 16px;
      z-index: 999;
      pointer-events: none;
      opacity: 0.95;
      border-radius: 2px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(108vh) rotate(760deg); opacity: 0; }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 920px) {
      .game-grid { grid-template-columns: 1fr; gap: 20px; }
      .game-main .controls { margin-bottom: 0; }
      .board-section { margin-top: 4px; }
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .main-container { padding: 30px 24px; }
      .board { grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); }
    }

    @media (max-width: 600px) {
      body { padding: 8px; align-items: flex-start; }
      .main-container { padding: 22px 16px; border-radius: 20px; }
      .game-header { margin-bottom: 22px; }
      .game-header h1 { font-size: 1.5em; padding: 0 46px; }
      .theme-toggle { width: 40px; height: 40px; font-size: 1em; }
      .settings-toggle { flex-wrap: wrap; }
      .settings-toggle-btn { width: 100%; flex: 1 1 100%; }
      .settings-inputs-row { flex-direction: column; gap: 12px; }
      .input-group { min-width: 0; justify-content: space-between; }
      .display-section { padding: 30px 16px 26px; margin-bottom: 16px; }
      .number-display { width: 138px; height: 138px; font-size: 3.6em; }
      .controls { padding: 22px 16px; margin: 18px 0; }
      .btn-large { font-size: 1.25em; padding: 20px; }
      .board { grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 7px; }
      .bottom-actions { gap: 10px; }
      .bottom-actions .btn { flex: 1 1 auto; min-width: 130px; }
    }

    @media (max-width: 380px) {
      .game-header h1 { font-size: 1.3em; }
      .number-display { width: 118px; height: 118px; font-size: 3em; }
      .board { grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); }
      .board-cell { font-size: 0.85em; }
      .recent-badge { width: 36px; height: 36px; font-size: 0.85em; }
      .bottom-actions { flex-direction: column; }
      .bottom-actions .btn { width: 100%; }
    }

    @media (hover: none) {
      .btn:hover, .btn-large:hover, .settings-toggle-btn:hover, .theme-toggle:hover {
        transform: none;
        box-shadow: none;
      }
      .btn:active { transform: scale(0.98); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <div class="main-container">
    <div class="game-header">
      <h1><span class="emoji">🎰</span> DSL Bingo Game</h1>
      <button id="theme_toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>

    <div class="layout-wrapper">
      <div class="settings-toggle">
        <span class="settings-label">Range</span>
        <button id="settings_toggle_btn" class="settings-toggle-btn" aria-expanded="false" aria-controls="settings_sidebar">
          <span id="range_display_btn">0–90</span>
          <span class="toggle-icon" aria-hidden="true">⚙️</span>
        </button>
      </div>

      <div id="settings_sidebar" class="settings-sidebar collapsed">
        <h2>Settings</h2>
        <div class="settings-inputs-row">
          <div class="input-group">
            <label for="min_number">Min Number:</label>
            <input type="number" id="min_number" value="0" min="0" inputmode="numeric" />
          </div>
          <div class="input-group">
            <label for="max_number">Max Number:</label>
            <input type="number" id="max_number" value="90" min="0" inputmode="numeric" />
          </div>
        </div>
        <div class="settings-options">
          <label class="checkbox-group">
            <input type="checkbox" id="voice_toggle" />
            🔊 Announce numbers aloud
          </label>
        </div>
        <button id="update_range_btn" class="btn btn-primary btn-block">Update Range &amp; Reset</button>
      </div>

      <div class="game-container">
        <div class="game-grid">
          <div class="game-main">
            <div class="display-section">
              <h3>Current Number</h3>
              <div class="ball-wrap">
                <div id="current_number" class="number-display" aria-live="polite" aria-atomic="true">–</div>
              </div>
            </div>

            <div class="recent-strip" id="recent_strip"></div>

            <div class="controls">
              <button id="next_number_btn" class="btn btn-large">Next Number</button>
              <p class="hint">Press <span class="kbd">Space</span> or <span class="kbd">N</span> to draw the next number · <span class="kbd">U</span> to undo</p>
            </div>
          </div>

          <div class="board-section">
            <h3>Board <span class="called-info">(<span id="called_count">0</span> / <span id="total_count">91</span> called)</span></h3>
            <div id="board" class="board" aria-label="Bingo board"></div>
          </div>
        </div>

        <div class="bottom-actions">
          <button id="undo_btn" class="btn btn-outline">↩ Undo Last</button>
          <button id="reset_btn" class="btn btn-danger">Reset Game</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Game State Manager ----------
    class BingoGame {
      static STORAGE_KEY = 'bingoGame';
      static DEFAULT_MIN = 0;
      static DEFAULT_MAX = 90;

      constructor() {
        this.loadState();
      }

      loadState() {
        let state = null;
        try {
          state = JSON.parse(localStorage.getItem(BingoGame.STORAGE_KEY));
        } catch (e) {
          state = null; // corrupted storage — fall back to defaults
        }

        if (state && Number.isFinite(state.minNumber) && Number.isFinite(state.maxNumber)) {
          this.minNumber = state.minNumber;
          this.maxNumber = state.maxNumber;
          this.calledNumbers = Array.isArray(state.calledNumbers) ? state.calledNumbers : [];
          this.voiceEnabled = !!state.voiceEnabled;
        } else {
          this.minNumber = BingoGame.DEFAULT_MIN;
          this.maxNumber = BingoGame.DEFAULT_MAX;
          this.calledNumbers = [];
          this.voiceEnabled = false;
        }
      }

      saveState() {
        try {
          localStorage.setItem(BingoGame.STORAGE_KEY, JSON.stringify({
            minNumber: this.minNumber,
            maxNumber: this.maxNumber,
            calledNumbers: this.calledNumbers,
            voiceEnabled: this.voiceEnabled
          }));
        } catch (e) {
          /* storage unavailable (e.g. private mode) — game still works in-memory */
        }
      }

      getTotalNumbers() {
        return this.maxNumber - this.minNumber + 1;
      }

      isComplete() {
        return this.calledNumbers.length >= this.getTotalNumbers();
      }

      getLastNumber() {
        return this.calledNumbers.length ? this.calledNumbers[this.calledNumbers.length - 1] : null;
      }

      getNextNumber() {
        const called = new Set(this.calledNumbers);
        const available = [];
        for (let i = this.minNumber; i <= this.maxNumber; i++) {
          if (!called.has(i)) available.push(i);
        }
        if (available.length === 0) return null;

        const selected = available[Math.floor(Math.random() * available.length)];
        this.calledNumbers.push(selected);
        this.saveState();
        return selected;
      }

      undoLast() {
        if (this.calledNumbers.length === 0) return null;
        const removed = this.calledNumbers.pop();
        this.saveState();
        return removed;
      }

      updateRange(min, max) {
        if (!Number.isInteger(min) || !Number.isInteger(max)) return false;
        if (min < 0 || max < 0) return false;
        if (min >= max) return false;
        this.minNumber = min;
        this.maxNumber = max;
        this.calledNumbers = [];
        this.saveState();
        return true;
      }

      setVoice(enabled) {
        this.voiceEnabled = enabled;
        this.saveState();
      }

      resetGame() {
        this.calledNumbers = [];
        this.saveState();
      }
    }

    const game = new BingoGame();

    // ---------- DOM refs ----------
    const el = {
      currentNumber: document.getElementById('current_number'),
      rangeDisplay: document.getElementById('range_display_btn'),
      minInput: document.getElementById('min_number'),
      maxInput: document.getElementById('max_number'),
      calledCount: document.getElementById('called_count'),
      totalCount: document.getElementById('total_count'),
      board: document.getElementById('board'),
      recentStrip: document.getElementById('recent_strip'),
      nextBtn: document.getElementById('next_number_btn'),
      undoBtn: document.getElementById('undo_btn'),
      resetBtn: document.getElementById('reset_btn'),
      settingsBtn: document.getElementById('settings_toggle_btn'),
      sidebar: document.getElementById('settings_sidebar'),
      updateBtn: document.getElementById('update_range_btn'),
      voiceToggle: document.getElementById('voice_toggle'),
      themeToggle: document.getElementById('theme_toggle')
    };

    const prefersReducedMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let rolling = false;

    // ---------- Voice announcements ----------
    function announce(number) {
      if (!game.voiceEnabled || !('speechSynthesis' in window)) return;
      try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(String(number));
        utter.rate = 0.85;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      } catch (e) { /* ignore */ }
    }

    // ---------- Rendering ----------
    function renderBoard() {
      const called = new Set(game.calledNumbers);
      const last = game.getLastNumber();
      const frag = document.createDocumentFragment();
      for (let i = game.minNumber; i <= game.maxNumber; i++) {
        const cell = document.createElement('div');
        cell.className = 'board-cell';
        if (called.has(i)) cell.classList.add('called');
        if (i === last) cell.classList.add('latest');
        cell.textContent = i;
        frag.appendChild(cell);
      }
      el.board.innerHTML = '';
      el.board.appendChild(frag);
    }

    function renderRecent() {
      const recent = game.calledNumbers.slice(-6).reverse();
      el.recentStrip.innerHTML = '';
      if (recent.length === 0) return;

      const label = document.createElement('span');
      label.className = 'recent-label';
      label.textContent = 'Recent';
      el.recentStrip.appendChild(label);

      recent.forEach(num => {
        const badge = document.createElement('span');
        badge.className = 'recent-badge';
        badge.textContent = num;
        el.recentStrip.appendChild(badge);
      });
    }

    function updateDisplay() {
      el.rangeDisplay.textContent = `${game.minNumber}–${game.maxNumber}`;
      el.minInput.value = game.minNumber;
      el.maxInput.value = game.maxNumber;
      el.calledCount.textContent = game.calledNumbers.length;
      el.totalCount.textContent = game.getTotalNumbers();
      el.voiceToggle.checked = game.voiceEnabled;
      el.nextBtn.disabled = rolling || game.isComplete();
      el.undoBtn.disabled = rolling || game.calledNumbers.length === 0;
      renderRecent();
      renderBoard();
    }

    function showCurrent(value, animate) {
      el.currentNumber.textContent = value;
      if (animate) {
        el.currentNumber.classList.remove('pop');
        void el.currentNumber.offsetWidth; // reflow to restart animation
        el.currentNumber.classList.add('pop');
      }
    }

    // ---------- Confetti celebration ----------
    function celebrate() {
      const colors = ['#a78bfa', '#6366f1', '#34d399', '#fb7185', '#fbbf24', '#38bdf8'];
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4600);
      }
    }

    // ---------- Actions ----------
    function settleOn(number) {
      showCurrent(number, true);
      announce(number);
      updateDisplay();
      if (game.isComplete()) celebrate();
    }

    // Animated "roll" that flashes random numbers before landing on the result.
    function rollTo(number) {
      if (prefersReducedMotion) {
        settleOn(number);
        return;
      }
      rolling = true;
      updateDisplay(); // disables buttons during the roll
      el.currentNumber.classList.add('rolling');

      const duration = 650;
      const start = performance.now();

      function frame(now) {
        const elapsed = now - start;
        if (elapsed < duration) {
          const span = game.maxNumber - game.minNumber + 1;
          el.currentNumber.textContent = game.minNumber + Math.floor(Math.random() * span);
          requestAnimationFrame(frame);
        } else {
          rolling = false;
          el.currentNumber.classList.remove('rolling');
          settleOn(number);
        }
      }
      requestAnimationFrame(frame);
    }

    function drawNext() {
      if (rolling || game.isComplete()) return;
      const number = game.getNextNumber();
      if (number === null) {
        updateDisplay();
        return;
      }
      rollTo(number);
    }

    function undo() {
      if (rolling) return;
      const removed = game.undoLast();
      if (removed === null) return;
      const last = game.getLastNumber();
      showCurrent(last === null ? '–' : last, false);
      updateDisplay();
    }

    // ---------- Theme ----------
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      el.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      try { localStorage.setItem('bingoTheme', theme); } catch (e) {}
    }

    // ---------- Event wiring ----------
    el.settingsBtn.addEventListener('click', () => {
      const collapsed = el.sidebar.classList.toggle('collapsed');
      el.settingsBtn.classList.toggle('active', !collapsed);
      el.settingsBtn.setAttribute('aria-expanded', String(!collapsed));
    });

    el.nextBtn.addEventListener('click', drawNext);
    el.undoBtn.addEventListener('click', undo);

    el.voiceToggle.addEventListener('change', () => {
      game.setVoice(el.voiceToggle.checked);
      if (el.voiceToggle.checked) announce('Voice enabled');
    });

    [el.minInput, el.maxInput].forEach(input => {
      input.addEventListener('input', () => {
        if (input.value && parseInt(input.value, 10) < 0) input.value = '0';
      });
    });

    el.updateBtn.addEventListener('click', () => {
      const min = parseInt(el.minInput.value, 10);
      const max = parseInt(el.maxInput.value, 10);

      if (Number.isNaN(min) || Number.isNaN(max)) {
        alert('Please enter valid numbers for both fields.');
        return;
      }
      if (min < 0 || max < 0) {
        alert('Numbers cannot be negative. Please enter values 0 or greater.');
        return;
      }
      if (min >= max) {
        alert('Min number must be less than max number.');
        return;
      }

      if (game.updateRange(min, max)) {
        el.sidebar.classList.add('collapsed');
        el.settingsBtn.classList.remove('active');
        el.settingsBtn.setAttribute('aria-expanded', 'false');
        showCurrent('–', false);
        updateDisplay();
      }
    });

    el.resetBtn.addEventListener('click', () => {
      if (rolling || game.calledNumbers.length === 0) return;
      if (confirm('Are you sure you want to reset the game?')) {
        game.resetGame();
        showCurrent('–', false);
        updateDisplay();
      }
    });

    el.themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Keyboard shortcuts (ignore while typing in inputs)
    document.addEventListener('keydown', (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;

      if (e.code === 'Space' || e.key.toLowerCase() === 'n') {
        e.preventDefault();
        drawNext();
      } else if (e.key.toLowerCase() === 'u') {
        e.preventDefault();
        undo();
      }
    });

    // ---------- Init ----------
    (function init() {
      let savedTheme = 'dark';
      try {
        savedTheme = localStorage.getItem('bingoTheme') ||
          (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      } catch (e) {}
      applyTheme(savedTheme);

      const last = game.getLastNumber();
      showCurrent(last === null ? '–' : last, false);
      updateDisplay();
    })();
  </script>
</body>
</html>
